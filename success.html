<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're in. Forefront Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1E2D1F;
    color: #F5F0E8;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .check {
    width: 64px; height: 64px;
    background: #7A9B78;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 32px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-style: italic;
    font-weight: 400;
    margin-bottom: 16px;
  }
  p {
    font-size: 16px;
    line-height: 1.8;
    color: #B2C9B0;
    max-width: 400px;
    margin-bottom: 40px;
  }
  a {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #C8A96E;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="check">✓</div>
  <h1>You're in.</h1>
  <p>We'll be in touch soon. You're one of the first. That means something here.</p>
  <a href="/">← Back to Forefront Co.</a>
</body>
</html>
